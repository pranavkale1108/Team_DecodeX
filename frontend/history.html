<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAtlas - History</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="history-body">
    <header class="navbar">
        <div class="logo">
            <div class="logo-icon">
                <i class="fa-solid fa-compass"></i>
            </div>
            <span>CodeAtlas</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="#" class="active">History</a>
        </nav>
    </header>

    <main class="history-main">
        <div class="history-header">
            <div class="history-badge">
                <i class="fa-regular fa-clock"></i> Recent analyses
            </div>
            <h1 class="history-title">
                Analysis <span class="gradient-text">history</span>
            </h1>
            <p class="history-subtitle">
                Every repository you analyze is saved here so you can re-open its architecture graph and AI insights anytime.
            </p>
            
            <div class="history-controls">
                <div class="history-search">
                    <input type="text" placeholder="Search history..." class="history-search-input">
                </div>
                <button class="btn-analyze-new">Analyze new repo <i class="fa-solid fa-arrow-right"></i></button>
                <button class="btn-clear"><i class="fa-regular fa-trash-can"></i> Clear all</button>
            </div>
        </div>

        <div class="history-list" id="history-container">
            <div style="text-align: center; color: #94a3b8; padding: 40px;">
                <div class="spinner" style="margin:0 auto 10px; width:24px; height:24px; border-width:2px;"></div>
                Loading history...
            </div>
        </div>
        
        <script>
        const API_BASE = "/api";
        
        async function loadHistory() {
            try {
                const res = await fetch(`${API_BASE}/history`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    const listEl = document.getElementById('history-container');
                    listEl.innerHTML = ''; 
                    
                    data.history.forEach(repo => {
                        const date = new Date(repo.created_at);
                        const displayDate = date.toLocaleString();
                        const strippedUrl = repo.repo_url.replace(/^https?:\/\//, '').replace(/\.git$/, '');
                        
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.innerHTML = `
                            <div class="history-icon"><i class="fa-solid fa-code-branch"></i></div>
                            <div class="history-details">
                                <div class="history-repo-name">${repo.repo_name}</div>
                                <div class="history-meta">
                                    <i class="fa-regular fa-clock"></i> ${displayDate} &nbsp;&nbsp; ${strippedUrl}
                                </div>
                            </div>
                            <div class="history-actions">
                                <button class="btn-reopen" onclick="window.location.href='dashboard.html?repo=' + encodeURIComponent('${repo.repo_url}')">Re-open <i class="fa-solid fa-arrow-right"></i></button>
                            </div>
                        `;
                        listEl.appendChild(item);
                    });
                    
                    if (data.history.length === 0) {
                        listEl.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 40px;">No repositories analyzed yet.</div>';
                    }
                }
            } catch (err) {
                const listEl = document.getElementById('history-container');
                listEl.innerHTML = '<div style="text-align: center; color: #ef4444; padding: 40px;">Error loading history. Make sure backend is running.</div>';
            }
        }
        
        document.querySelector('.btn-analyze-new').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        document.querySelector('.btn-clear').addEventListener('click', () => {
             alert("Clear all functionality not synced with DB yet (Future enhancement).");
        });
        
        loadHistory();

        // Implement Search logic
        const historySearchInput = document.querySelector('.history-search-input');
        if (historySearchInput) {
            historySearchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.history-item');
                items.forEach(item => {
                    const name = item.querySelector('.history-repo-name').innerText.toLowerCase();
                    const meta = item.querySelector('.history-meta').innerText.toLowerCase();
                    if (name.includes(term) || meta.includes(term)) {
                        item.style.display = 'flex';
                    } else {
                        item.style.display = 'none';
                    }
                });
            });
        }
        </script>
        
        <div class="footer">
            <p>&copy; 2026 CodeAtlas — Built for developers.</p>
        </div>
    </main>
</body>
</html>
